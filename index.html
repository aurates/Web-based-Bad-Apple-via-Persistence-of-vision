<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POV Breakout - Pretext Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
            background: white;
            color: black;
            line-height: 1;
        }

        #mobileWarning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            z-index: 9999;
        }

        #gameContainer {
            width: 90vw;
            height: 90vh;
            margin: 0 auto;
            position: relative;
            border: 2px solid black;
            overflow: hidden;
        }

        #gameDisplay {
            width: 100%;
            height: 100%;
            font-family: monospace;
            font-size: 12px;
            line-height: 1;
            white-space: pre;
            background: white;
            color: black;
            overflow: hidden;
            padding: 0;
        }

        #scoreContainer {
            width: 90vw;
            height: calc(10vh - 2px);
            margin: 0 auto;
            border: 2px solid black;
            border-top: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: white;
            color: black;
        }

        #divider {
            width: 90vw;
            height: 2px;
            margin: 0 auto;
            background: black;
        }
    </style>
</head>
<body>
    <div id="mobileWarning">
        PC browser only. This game is not available on mobile devices.
    </div>

    <div id="gameContainer">
        <div id="gameDisplay"></div>
    </div>
    <div id="divider"></div>
    <div id="scoreContainer">
        Bounces: <span id="bounceCount">0</span>
    </div>

    <script>
        // Mobile detection
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (window.innerWidth <= 768) ||
                   ('ontouchstart' in window);
        }

        if (isMobile()) {
            document.getElementById('mobileWarning').style.display = 'flex';
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('divider').style.display = 'none';
            document.getElementById('scoreContainer').style.display = 'none';
        } else {
            // PRETEXT DEMO - Text-based rendering for Persistence of Vision
            const display = document.getElementById('gameDisplay');
            const bounceCountEl = document.getElementById('bounceCount');

            // Calculate grid dimensions based on container
            const container = document.getElementById('gameContainer');
            const CHAR_WIDTH = 8;  // Approximate character width
            const CHAR_HEIGHT = 12; // Approximate character height

            const COLS = Math.floor(container.clientWidth / CHAR_WIDTH);
            const ROWS = Math.floor(container.clientHeight / CHAR_HEIGHT);

            // Game state
            const game = {
                paddle: {
                    x: Math.floor(COLS / 2) - 5,
                    y: ROWS - 3,
                    width: 10,
                    speed: 1
                },
                ball: {
                    x: Math.floor(COLS / 2),
                    y: Math.floor(ROWS / 2),
                    dx: 1,
                    dy: -1
                },
                bounces: 0,
                keys: {
                    left: false,
                    right: false
                },
                frame: 0
            };

            // Keyboard input
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') game.keys.left = true;
                if (e.key === 'ArrowRight') game.keys.right = true;
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') game.keys.left = false;
                if (e.key === 'ArrowRight') game.keys.right = false;
            });

            // Create empty grid
            function createGrid() {
                const grid = [];
                for (let y = 0; y < ROWS; y++) {
                    const row = [];
                    for (let x = 0; x < COLS; x++) {
                        row.push('■');  // U+25A0 background
                    }
                    grid.push(row);
                }
                return grid;
            }

            // Update game state
            function update() {
                game.frame++;

                // Move paddle
                if (game.keys.left && game.paddle.x > 0) {
                    game.paddle.x -= game.paddle.speed;
                }
                if (game.keys.right && game.paddle.x < COLS - game.paddle.width) {
                    game.paddle.x += game.paddle.speed;
                }

                // Move ball (every other frame for better visibility)
                if (game.frame % 2 === 0) {
                    game.ball.x += game.ball.dx;
                    game.ball.y += game.ball.dy;

                    // Wall collision - left and right
                    if (game.ball.x <= 0 || game.ball.x >= COLS - 1) {
                        game.ball.dx = -game.ball.dx;
                        game.ball.x = Math.max(0, Math.min(COLS - 1, game.ball.x));
                    }

                    // Wall collision - top
                    if (game.ball.y <= 0) {
                        game.ball.dy = -game.ball.dy;
                        game.ball.y = 0;
                    }

                    // Paddle collision
                    const paddleY = game.paddle.y;
                    if (game.ball.y >= paddleY - 1 && game.ball.y <= paddleY &&
                        game.ball.x >= game.paddle.x &&
                        game.ball.x < game.paddle.x + game.paddle.width &&
                        game.ball.dy > 0) {

                        game.ball.dy = -game.ball.dy;

                        // Adjust horizontal direction based on hit position
                        const hitPos = game.ball.x - (game.paddle.x + game.paddle.width / 2);
                        if (Math.abs(hitPos) > game.paddle.width / 4) {
                            game.ball.dx = hitPos > 0 ? 1 : -1;
                        }

                        game.bounces++;
                        bounceCountEl.textContent = game.bounces;
                    }

                    // Ball falls below paddle - reset
                    if (game.ball.y >= ROWS) {
                        game.ball.x = Math.floor(COLS / 2);
                        game.ball.y = Math.floor(ROWS / 2);
                        game.ball.dx = 1;
                        game.ball.dy = -1;
                    }
                }
            }

            // Render game using TEXT (PRETEXT technique)
            function render() {
                const grid = createGrid();

                // Draw walls (darker border)
                for (let x = 0; x < COLS; x++) {
                    grid[0][x] = '▓';  // Top wall
                }
                for (let y = 0; y < ROWS; y++) {
                    grid[y][0] = '▓';  // Left wall
                    grid[y][COLS - 1] = '▓';  // Right wall
                }

                // Draw paddle (horizontal line)
                const paddleY = game.paddle.y;
                for (let x = 0; x < game.paddle.width; x++) {
                    const px = game.paddle.x + x;
                    if (px >= 0 && px < COLS && paddleY >= 0 && paddleY < ROWS) {
                        grid[paddleY][px] = '━';  // Horizontal line
                    }
                }

                // Draw ball (U+25CF - Black Circle)
                const bx = Math.floor(game.ball.x);
                const by = Math.floor(game.ball.y);
                if (bx >= 0 && bx < COLS && by >= 0 && by < ROWS) {
                    grid[by][bx] = '●';  // U+25CF
                }

                // Convert grid to text and render
                const text = grid.map(row => row.join('')).join('\n');
                display.textContent = text;
            }

            // Game loop using requestAnimationFrame (60fps)
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // Start game
            gameLoop();
        }
    </script>
</body>
</html>
