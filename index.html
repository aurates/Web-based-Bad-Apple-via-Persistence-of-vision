<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext Demo - Text Measurement Performance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
            background: white;
            color: black;
        }

        #mobileWarning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            z-index: 9999;
        }

        #gameContainer {
            width: 90vw;
            height: 90vh;
            margin: 0 auto;
            position: relative;
            border: 2px solid black;
            overflow: hidden;
            background: white;
        }

        #textDisplay {
            width: 100%;
            height: 100%;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow: hidden;
        }

        #scoreContainer {
            width: 90vw;
            height: calc(10vh - 2px);
            margin: 0 auto;
            border: 2px solid black;
            border-top: none;
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: 16px;
            background: white;
            color: black;
            padding: 0 20px;
        }

        #divider {
            width: 90vw;
            height: 2px;
            margin: 0 auto;
            background: black;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .metric-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .metric-value {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="mobileWarning">
        PC browser only. This demo is not available on mobile devices.
    </div>

    <div id="gameContainer">
        <div id="textDisplay"></div>
    </div>
    <div id="divider"></div>
    <div id="scoreContainer">
        <div class="metric">
            <span class="metric-label">Bounces</span>
            <span class="metric-value" id="bounceCount">0</span>
        </div>
        <div class="metric">
            <span class="metric-label">Pretext prepare() time</span>
            <span class="metric-value" id="prepareTime">0ms</span>
        </div>
        <div class="metric">
            <span class="metric-label">Pretext layout() time</span>
            <span class="metric-value" id="layoutTime">0μs</span>
        </div>
        <div class="metric">
            <span class="metric-label">Text height</span>
            <span class="metric-value" id="textHeight">0px</span>
        </div>
    </div>

    <script type="module">
        import { prepare, layout } from '@chenglou/pretext';

        // Mobile detection
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   (window.innerWidth <= 768) ||
                   ('ontouchstart' in window);
        }

        if (isMobile()) {
            document.getElementById('mobileWarning').style.display = 'flex';
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('divider').style.display = 'none';
            document.getElementById('scoreContainer').style.display = 'none';
        } else {
            // PRETEXT DEMO - Using the actual Pretext library for text measurement
            const textDisplay = document.getElementById('textDisplay');
            const bounceCountEl = document.getElementById('bounceCount');
            const prepareTimeEl = document.getElementById('prepareTime');
            const layoutTimeEl = document.getElementById('layoutTime');
            const textHeightEl = document.getElementById('textHeight');
            const container = document.getElementById('gameContainer');

            // Game state
            const game = {
                bounces: 0,
                ballPos: { row: 5, col: 40 },
                paddlePos: { row: 20, col: 35 },
                ballVel: { row: 1, col: 1 },
                paddleWidth: 10,
                keys: { left: false, right: false },
                frame: 0,
                preparedText: null,
                lastPrepareTime: 0,
                lastLayoutTime: 0
            };

            const ROWS = 25;
            const COLS = 80;

            // Keyboard input
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') game.keys.left = true;
                if (e.key === 'ArrowRight') game.keys.right = true;
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') game.keys.left = false;
                if (e.key === 'ArrowRight') game.keys.right = false;
            });

            // Generate game text content
            function generateGameText() {
                const lines = [];

                // Create the game field
                for (let r = 0; r < ROWS; r++) {
                    let line = '';
                    for (let c = 0; c < COLS; c++) {
                        // Walls
                        if (r === 0 || c === 0 || c === COLS - 1) {
                            line += '▓';
                        }
                        // Ball
                        else if (r === Math.floor(game.ballPos.row) && c === Math.floor(game.ballPos.col)) {
                            line += '●';
                        }
                        // Paddle
                        else if (r === game.paddlePos.row &&
                                 c >= game.paddlePos.col &&
                                 c < game.paddlePos.col + game.paddleWidth) {
                            line += '━';
                        }
                        // Background
                        else {
                            line += '■';
                        }
                    }
                    lines.push(line);
                }

                // Add game instructions
                lines.push('');
                lines.push('Use Arrow Keys ← → to move the paddle');
                lines.push('Bounce the ball ● back up to keep playing!');
                lines.push('');
                lines.push('This demo uses Pretext library to:');
                lines.push('1. measure() text WITHOUT touching DOM (no reflow!)');
                lines.push('2. layout() calculates dimensions using pure arithmetic');
                lines.push('3. Shows prepare() and layout() performance metrics below');

                return lines.join('\n');
            }

            // Update game state
            function update() {
                game.frame++;

                // Move paddle
                if (game.keys.left && game.paddlePos.col > 1) {
                    game.paddlePos.col -= 1;
                }
                if (game.keys.right && game.paddlePos.col < COLS - game.paddleWidth - 1) {
                    game.paddlePos.col += 1;
                }

                // Move ball every other frame
                if (game.frame % 2 === 0) {
                    game.ballPos.row += game.ballVel.row;
                    game.ballPos.col += game.ballVel.col;

                    // Wall collisions
                    if (game.ballPos.col <= 1 || game.ballPos.col >= COLS - 2) {
                        game.ballVel.col = -game.ballVel.col;
                        game.ballPos.col = Math.max(1, Math.min(COLS - 2, game.ballPos.col));
                    }

                    // Top wall
                    if (game.ballPos.row <= 1) {
                        game.ballVel.row = -game.ballVel.row;
                        game.ballPos.row = 1;
                    }

                    // Paddle collision
                    if (Math.floor(game.ballPos.row) === game.paddlePos.row - 1 &&
                        Math.floor(game.ballPos.col) >= game.paddlePos.col &&
                        Math.floor(game.ballPos.col) < game.paddlePos.col + game.paddleWidth &&
                        game.ballVel.row > 0) {

                        game.ballVel.row = -game.ballVel.row;

                        // Adjust horizontal direction based on hit position
                        const hitPos = game.ballPos.col - (game.paddlePos.col + game.paddleWidth / 2);
                        if (Math.abs(hitPos) > game.paddleWidth / 4) {
                            game.ballVel.col = hitPos > 0 ? 1 : -1;
                        }

                        game.bounces++;
                        bounceCountEl.textContent = game.bounces;
                    }

                    // Ball falls below - reset
                    if (game.ballPos.row >= ROWS) {
                        game.ballPos = { row: 5, col: 40 };
                        game.ballVel = { row: 1, col: 1 };
                    }
                }
            }

            // Render using Pretext
            function render() {
                const gameText = generateGameText();

                // Use Pretext to prepare and measure the text
                // This demonstrates Pretext's core value: fast text measurement without DOM

                // PREPARE: One-time text analysis (normalization, segmentation, measurement)
                const prepareStart = performance.now();
                const prepared = prepare(gameText, '12px monospace', { whiteSpace: 'pre-wrap' });
                const prepareEnd = performance.now();
                const prepareTime = prepareEnd - prepareStart;
                game.lastPrepareTime = prepareTime;

                // LAYOUT: Fast arithmetic-only dimension calculation
                const layoutStart = performance.now();
                const containerWidth = container.clientWidth - 20; // Account for padding
                const { height, lineCount } = layout(prepared, containerWidth, 18); // 18px line height (1.5 * 12px)
                const layoutEnd = performance.now();
                const layoutTime = layoutEnd - layoutStart;
                game.lastLayoutTime = layoutTime;

                // Update the display
                textDisplay.textContent = gameText;

                // Update metrics (throttled updates for readability)
                if (game.frame % 30 === 0) {
                    prepareTimeEl.textContent = prepareTime.toFixed(3) + 'ms';
                    layoutTimeEl.textContent = (layoutTime * 1000).toFixed(1) + 'μs';
                    textHeightEl.textContent = Math.round(height) + 'px';
                }
            }

            // Game loop
            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // Start
            gameLoop();
        }
    </script>
</body>
</html>
